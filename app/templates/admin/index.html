<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ static_url('dist/layui/css/layui.css') }}">
    <link rel="stylesheet" href="{{ static_url('dist/bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ static_url('dist/fontawesome-free-5.15.4-web/fontawesome-free-5.15.4-web/css/all.min.css') }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .layui-layout-admin .layui-header {
            background: #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            z-index: 1000;
        }
        .layui-layout-admin .layui-header .layui-logo {
            background: #1a1a2e;
            color: #fff;
            font-weight: 500;
            font-size: 15px;
            box-shadow: none;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 16px;
        }
        .layui-layout-admin .layui-header .layui-logo i { font-size: 20px; }
        .header-right {
            display: flex;
            align-items: center;
            height: 100%;
            float: right;
            padding-right: 16px;
        }
        .header-user {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 0 12px;
            color: #333;
        }
        .header-user img {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: #e0e0e0;
        }
        .layui-layout-admin .layui-side {
            box-shadow: 2px 0 6px rgba(0,0,0,0.05);
        }
        .layui-side-scroll .layui-nav {
            background: #1a1a2e;
        }
        .layui-nav-tree .layui-nav-item a {
            color: rgba(255,255,255,0.7);
            text-decoration: none !important;
        }
        .layui-nav-tree .layui-nav-item a:hover {
            color: #fff;
            text-decoration: none !important;
        }
        .layui-nav-tree .layui-this a {
            background: #3498db !important;
            color: #fff;
        }
        .layui-nav-tree .layui-nav-child dd.layui-this a {
            background: transparent;
            color: #fff !important;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none !important;
        }
        .layui-nav-tree .layui-nav-child dd a {
            text-decoration: none !important;
            font-size: 13px;
        }
        .layui-nav-tree .layui-nav-child dd a:hover {
            text-decoration: none !important;
        }
        .layui-nav-tree .layui-nav-itemed > a {
            color: #fff;
            background: rgba(52,152,219,0.2);
        }
        .layui-body { background: #f0f2f5; }
        .admin-iframe {
            width: 100%;
            height: calc(100vh - 60px - 41px);
            border: none;
        }
        .layui-footer {
            background: #fff;
            color: #999;
            font-size: 13px;
            text-align: center;
            box-shadow: 0 -1px 4px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body class="layui-layout-body">
    <div class="layui-layout layui-layout-admin">
        <div class="layui-header">
            <div class="layui-logo">
                <i class="fas fa-chart-line"></i>
                <span>智能瞭望与问数系统</span>
            </div>
            <div class="header-right">
                <div class="header-user" id="userMenu">
                    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23666'%3E%3Cpath d='M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z'/%3E%3C/svg%3E" alt="avatar">
                    <span>{{ current_user }}</span>
                    <i class="fas fa-caret-down" style="font-size: 12px; color: #999;"></i>
                </div>
            </div>
        </div>

        <div class="layui-side layui-bg-black">
            <div class="layui-side-scroll">
                <ul class="layui-nav layui-nav-tree" lay-filter="adminNav" lay-shrink="all">

                    <li class="layui-nav-item layui-this">
                        <a href="javascript:;" data-href="/admin/home" data-title="首页"><i class="fas fa-home"></i>&nbsp;&nbsp;首页</a>
                    </li>

                    <li class="layui-nav-item">
                        <a href="javascript:;"><i class="fas fa-cogs"></i>&nbsp;&nbsp;系统管理</a>
                        <dl class="layui-nav-child">
                            <dd><a href="javascript:;" data-href="/admin/user" data-title="用户管理"><i class="fas fa-users-cog"></i>&nbsp;&nbsp;用户管理</a></dd>
                            <dd><a href="javascript:;" data-href="/admin/role" data-title="角色管理"><i class="fas fa-user-tag"></i>&nbsp;&nbsp;角色管理</a></dd>
                            <dd><a href="javascript:;" data-href="/admin/function" data-title="功能管理"><i class="fas fa-th-large"></i>&nbsp;&nbsp;功能管理</a></dd>
                        </dl>
                    </li>

                    <li class="layui-nav-item">
                        <a href="javascript:;"><i class="fas fa-satellite-dish"></i>&nbsp;&nbsp;智能瞭望</a>
                        <dl class="layui-nav-child">
                            <dd><a href="javascript:;" data-href="/admin/lookout-manage" data-title="瞭源管理"><i class="fas fa-satellite-dish"></i>&nbsp;&nbsp;瞭源管理</a></dd>
                            <dd><a href="javascript:;" data-href="/admin/lookout-collect" data-title="瞭望采集"><i class="fas fa-download"></i>&nbsp;&nbsp;瞭望采集</a></dd>
                        </dl>
                    </li>

                    <li class="layui-nav-item">
                        <a href="javascript:;"><i class="fas fa-robot"></i>&nbsp;&nbsp;模型管理</a>
                        <dl class="layui-nav-child">
                            <dd><a href="javascript:;" data-href="/admin/model" data-title="模型引擎"><i class="fas fa-brain"></i>&nbsp;&nbsp;模型引擎</a></dd>
                        </dl>
                    </li>

                    <li class="layui-nav-item">
                        <a href="javascript:;"><i class="fas fa-database"></i>&nbsp;&nbsp;数据管理</a>
                        <dl class="layui-nav-child">
                            <dd><a href="javascript:;" data-href="/admin/data-warehouse" data-title="数据仓库"><i class="fas fa-server"></i>&nbsp;&nbsp;数据仓库</a></dd>
                        </dl>
                    </li>

                    <li class="layui-nav-item">
                        <a href="javascript:;"><i class="fas fa-plug"></i>&nbsp;&nbsp;接口服务</a>
                        <dl class="layui-nav-child">
                            <dd><a href="javascript:;" data-href="/admin/api-manage" data-title="接口管理"><i class="fas fa-code"></i>&nbsp;&nbsp;接口管理</a></dd>
                        </dl>
                    </li>

                    <li class="layui-nav-item">
                        <a href="javascript:;"><i class="fas fa-brain"></i>&nbsp;&nbsp;智能服务</a>
                        <dl class="layui-nav-child">
                            <dd><a href="javascript:;" data-href="/admin/digital-employee" data-title="数字员工"><i class="fas fa-user-tie"></i>&nbsp;&nbsp;数字员工</a></dd>
                        </dl>
                    </li>

                    <li class="layui-nav-item">
                        <a href="javascript:;" data-href="/admin/data-screen" data-title="数智大屏"><i class="fas fa-tv"></i>&nbsp;&nbsp;数智大屏</a>
                    </li>

                    <li class="layui-nav-item">
                        <a href="javascript:;" data-href="/admin/system-stats" data-title="系统统计"><i class="fas fa-chart-pie"></i>&nbsp;&nbsp;系统统计</a>
                    </li>

                    <li class="layui-nav-item">
                        <a href="javascript:;"><i class="fas fa-cog"></i>&nbsp;&nbsp;系统设置</a>
                        <dl class="layui-nav-child">
                            <dd><a href="javascript:;" data-href="/admin/system-config" data-title="系统配置"><i class="fas fa-sliders-h"></i>&nbsp;&nbsp;系统配置</a></dd>
                            <dd><a href="javascript:;" data-href="/admin/audit" data-title="日志审计"><i class="fas fa-clipboard-list"></i>&nbsp;&nbsp;日志审计</a></dd>
                        </dl>
                    </li>

                </ul>
            </div>
        </div>

        <div class="layui-body">
            <iframe id="contentFrame" class="admin-iframe" src="/admin/home"></iframe>
        </div>

        <div class="layui-footer">
            &copy; 2026 智能瞭望与问数系统 v1.0 | 智能问数 &middot; 数据驱动决策
        </div>
    </div>

    <script src="{{ static_url('dist/layui/layui.js') }}"></script>
    <script>
        layui.use(['element', 'dropdown'], function() {
            var element = layui.element;
            var dropdown = layui.dropdown;
            var layer = layui.layer;

            dropdown.render({
                elem: '#userMenu',
                data: [{title: '退出登录', id: 'logout'}],
                click: function(obj) {
                    if (obj.id === 'logout') {
                        layer.confirm('确认退出登录？', {icon: 3, title: '提示'}, function(idx) {
                            var f = document.createElement('form');
                            f.method = 'GET';
                            f.action = '/admin/logout';
                            document.body.appendChild(f);
                            f.submit();
                        });
                    }
                }
            });

            document.addEventListener('click', function(e) {
                var link = e.target.closest('[data-href]');
                if (!link) return;
                var href = link.getAttribute('data-href');
                document.getElementById('contentFrame').src = href;
                document.querySelectorAll('.layui-nav-item').forEach(function(item) {
                    item.classList.remove('layui-this');
                });
                link.parentElement.classList.add('layui-this');
            });
        });
    </script>
</body>
</html>
