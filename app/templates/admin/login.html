<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="{{ static_url('dist/bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ static_url('dist/fontawesome-free-5.15.4-web/fontawesome-free-5.15.4-web/css/all.min.css') }}">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 0;
            overflow: hidden;
        }

        .login-bg::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(52, 152, 219, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(46, 204, 113, 0.06) 0%, transparent 50%);
            animation: bgFloat 20s ease-in-out infinite;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(1deg); }
            66% { transform: translate(-20px, 20px) rotate(-1deg); }
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 420px;
            max-width: 90vw;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 48px 40px;
            transition: transform 0.3s ease;
        }

        .login-card:hover { transform: translateY(-2px); }

        .login-header { text-align: center; margin-bottom: 36px; }

        .login-logo {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #3498db, #2c3e50);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(52, 152, 219, 0.3);
        }

        .login-logo i { font-size: 28px; color: #fff; }

        .login-title {
            font-size: 22px;
            font-weight: 600;
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        .login-subtitle { font-size: 13px; color: #8c8c8c; }

        .form-group { margin-bottom: 20px; }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #555;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            font-size: 16px;
            color: #aaa;
            transition: color 0.2s;
        }

        .input-wrapper input {
            width: 100%;
            height: 46px;
            padding: 0 14px 0 42px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            background: #fafafa;
            transition: all 0.2s;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: #3498db;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
        }

        .input-wrapper input:focus + i,
        .input-wrapper input:focus ~ i { color: #3498db; }

        .btn-login {
            width: 100%;
            height: 46px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }

        .btn-login:hover {
            background: linear-gradient(135deg, #2980b9, #2471a3);
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(52, 152, 219, 0.4);
        }

        .btn-login:active { transform: translateY(0); }

        .error-msg {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #d4380d;
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .error-msg.show { display: flex; align-items: center; }
        .error-msg i { margin-right: 8px; }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: #999;
        }

        @media (max-width: 480px) {
            .login-card { padding: 36px 24px; border-radius: 12px; }
            .login-title { font-size: 19px; }
        }
    </style>
</head>
<body>
    <div class="login-bg"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <i class="fas fa-chart-line"></i>
                </div>
                <h1 class="login-title">AI 智能瞭望系统</h1>
                <p class="login-subtitle">智能问数 · 数据驱动决策</p>
            </div>

            {% if error %}
            <div class="error-msg show">
                <i class="fas fa-exclamation-circle"></i>
                <span>{{ error }}</span>
            </div>
            {% end %}

            <form id="loginForm" method="post" action="/admin/login">
                {% module xsrf_form_html() %}
                <div class="form-group">
                    <label for="username">管理员账号</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" name="username" placeholder="请输入管理员账号" autocomplete="username" required>
                        <i class="fas fa-user"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">登录密码</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" placeholder="请输入登录密码" autocomplete="current-password" required>
                        <i class="fas fa-lock"></i>
                    </div>
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt" style="margin-right: 6px;"></i>登 录
                </button>
            </form>

            <div class="login-footer">
                <p>&copy; 2026 AI 智能瞭望系统 v1.0</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var form = document.getElementById('loginForm');
            form.addEventListener('submit', function() {
                var btn = form.querySelector('.btn-login');
                btn.disabled = true;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:6px;"></i>登录中...';
            });
        });
    </script>
</body>
</html>
