<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - 智能对话</title>
    <link rel="stylesheet" href="/static/dist/fontawesome-free-5.15.4-web/fontawesome-free-5.15.4-web/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #0a0e27; --bg-sidebar: rgba(10,14,39,0.95); --bg-main: #0d1117;
            --primary: #6366f1; --primary-light: #818cf8; --accent: #64f4ac;
            --text: #e0e6ed; --text-muted: #8892b0; --border: rgba(100,140,255,0.1);
            --msg-user: rgba(99,102,241,0.15); --msg-ai: rgba(255,255,255,0.03);
        }
        body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; color: var(--text); background: var(--bg-main); overflow: hidden; height: 100vh; }
        .app-container { display: flex; height: 100vh; }

        /* Sidebar */
        .sidebar {
            width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; transition: transform 0.3s; z-index: 200;
        }
        .sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        .sidebar-header .logo { font-size: 15px; font-weight: 700; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sidebar-header .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; flex-shrink: 0; }
        .new-chat-btn {
            display: flex; align-items: center; justify-content: center; gap: 8px; margin: 12px 12px 8px;
            padding: 10px; background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: #fff; border: none; border-radius: 10px; cursor: pointer; font-size: 14px; transition: all 0.3s;
        }
        .new-chat-btn:hover { box-shadow: 0 0 20px rgba(99,102,241,0.3); transform: translateY(-1px); }
        .model-selector { padding: 8px 12px; border-bottom: 1px solid var(--border); }
        .model-selector label { font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; margin-bottom: 4px; }
        .model-select {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: var(--text); border-radius: 8px; padding: 6px 8px; font-size: 12px; outline: none; cursor: pointer;
        }
        .session-list { flex: 1; overflow-y: auto; padding: 8px; }
        .session-list::-webkit-scrollbar { width: 4px; }
        .session-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
        .session-group-title { font-size: 11px; color: #555d7e; padding: 8px 8px 4px; text-transform: uppercase; letter-spacing: 1px; }
        .session-item {
            padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--text-muted);
            display: flex; align-items: center; gap: 8px; transition: all 0.2s; margin-bottom: 2px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .session-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
        .session-item.active { background: rgba(99,102,241,0.15); color: var(--text); }
        .session-item i { font-size: 14px; flex-shrink: 0; }
        .session-item .del-btn { opacity: 0; margin-left: auto; color: #ff6b81; cursor: pointer; padding: 2px 4px; border-radius: 4px; flex-shrink: 0; }
        .session-item:hover .del-btn { opacity: 0.7; }
        .session-item .del-btn:hover { opacity: 1; background: rgba(255,107,129,0.15); }
        .sidebar-footer { padding: 10px 12px; border-top: 1px solid var(--border); }
        .sidebar-footer a { color: var(--text-muted); text-decoration: none; font-size: 13px; display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 8px; transition: all 0.2s; }
        .sidebar-footer a:hover { color: var(--text); background: rgba(255,255,255,0.05); }

        /* Main */
        .main-area { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
        .chat-header { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; background: rgba(13,17,23,0.8); backdrop-filter: blur(10px); }
        .menu-toggle { display: none; background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; padding: 4px; }
        .chat-header-title { font-size: 14px; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-header-model { font-size: 12px; color: var(--text-muted); background: rgba(99,102,241,0.15); padding: 4px 10px; border-radius: 12px; }

        /* Messages */
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; scroll-behavior: smooth; }
        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        .welcome-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); text-align: center; }
        .welcome-icon { width: 80px; height: 80px; border-radius: 24px; background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(100,244,172,0.1)); display: flex; align-items: center; justify-content: center; margin-bottom: 24px; }
        .welcome-icon i { font-size: 36px; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .welcome-screen h2 { font-size: 22px; margin-bottom: 8px; color: var(--text); font-weight: 600; }
        .welcome-screen p { font-size: 14px; margin-bottom: 24px; }
        .suggestions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; max-width: 500px; }
        .suggestion { padding: 8px 16px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 20px; font-size: 13px; color: var(--text-muted); cursor: pointer; transition: all 0.2s; }
        .suggestion:hover { border-color: var(--primary); color: var(--text); background: rgba(99,102,241,0.1); }

        /* Message bubble */
        .message { display: flex; gap: 12px; margin-bottom: 24px; max-width: 750px; margin-left: auto; margin-right: auto; padding: 0 8px; }
        .message.user { flex-direction: row-reverse; }
        .msg-avatar {
            width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: 14px; flex-shrink: 0;
        }
        .message.user .msg-avatar { background: var(--primary); color: #fff; }
        .message.assistant .msg-avatar { background: rgba(255,255,255,0.08); color: var(--accent); }
        .msg-content { flex: 1; min-width: 0; }
        .msg-name { font-size: 12px; font-weight: 600; margin-bottom: 4px; color: var(--text-muted); }
        .msg-bubble { padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.7; word-wrap: break-word; }
        .message.user .msg-bubble { background: var(--msg-user); border-top-right-radius: 4px; }
        .message.assistant .msg-bubble { background: var(--msg-ai); border: 1px solid var(--border); border-top-left-radius: 4px; }
        .msg-bubble pre { background: rgba(0,0,0,0.3); border-radius: 8px; padding: 12px; overflow-x: auto; margin: 8px 0; font-size: 13px; }
        .msg-bubble code { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
        .msg-bubble pre code { background: none; padding: 0; }
        .msg-bubble p { margin-bottom: 8px; }
        .msg-bubble p:last-child { margin-bottom: 0; }
        .msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin-bottom: 8px; }
        .msg-bubble blockquote { border-left: 3px solid var(--primary); padding-left: 12px; color: var(--text-muted); margin: 8px 0; }
        .msg-bubble table { border-collapse: collapse; margin: 8px 0; width: 100%; }
        .msg-bubble th, .msg-bubble td { border: 1px solid var(--border); padding: 6px 10px; font-size: 13px; }
        .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 { margin: 12px 0 8px; font-weight: 600; }
        .msg-bubble h1 { font-size: 20px; } .msg-bubble h2 { font-size: 18px; } .msg-bubble h3 { font-size: 16px; }
        .typing-dots { display: flex; gap: 4px; padding: 4px 0; }
        .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--primary); animation: blink 1.2s infinite; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1); } }

        /* Input area */
        .chat-input-area { padding: 12px 16px 16px; border-top: 1px solid var(--border); background: rgba(13,17,23,0.9); backdrop-filter: blur(10px); }
        .input-container { max-width: 750px; margin: 0 auto; position: relative; }
        .input-wrapper {
            display: flex; align-items: flex-end; background: rgba(255,255,255,0.06);
            border: 1px solid var(--border); border-radius: 16px; padding: 8px 12px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .input-wrapper:focus-within { border-color: var(--primary); box-shadow: 0 0 24px rgba(99,102,241,0.15); }
        #chatInput {
            flex: 1; background: none; border: none; color: var(--text); font-size: 14px;
            outline: none; resize: none; max-height: 120px; padding: 4px 0; line-height: 1.5; font-family: inherit;
        }
        #chatInput::placeholder { color: #555d7e; }
        .send-btn {
            width: 36px; height: 36px; border-radius: 10px; border: none;
            background: var(--primary); color: #fff; cursor: pointer; display: flex;
            align-items: center; justify-content: center; transition: all 0.3s; flex-shrink: 0; margin-left: 8px;
        }
        .send-btn:hover { background: var(--primary-light); transform: scale(1.05); }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .input-hint { font-size: 11px; color: #555d7e; margin-top: 6px; text-align: center; }

        /* Employee dropdown */
        .emp-dropdown {
            position: absolute; bottom: 100%; left: 12px; background: rgba(16,20,36,0.98);
            border: 1px solid var(--border); border-radius: 12px; padding: 6px; max-height: 220px;
            overflow-y: auto; display: none; width: 240px; margin-bottom: 8px; z-index: 10;
            box-shadow: 0 -8px 30px rgba(0,0,0,0.3);
        }
        .emp-dropdown.show { display: block; }
        .emp-option { padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 10px; transition: background 0.15s; }
        .emp-option:hover { background: rgba(99,102,241,0.15); }
        .emp-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
        .emp-info { flex: 1; min-width: 0; }
        .emp-info .emp-name { font-weight: 600; color: var(--text); }
        .emp-info .emp-desc { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        @media (max-width: 768px) {
            .sidebar { position: fixed; left: 0; top: 0; bottom: 0; transform: translateX(-100%); width: 280px; }
            .sidebar.open { transform: translateX(0); }
            .menu-toggle { display: block; }
            .suggestions { flex-direction: column; align-items: stretch; }
            .message { padding: 0; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="avatar"><i class="fas fa-user"></i></div>
                <span class="logo">{{ current_user }}</span>
            </div>
            <button class="new-chat-btn" onclick="createSession()"><i class="fas fa-plus"></i> 新对话</button>
            <div class="model-selector">
                <label><i class="fas fa-brain"></i> 当前模型</label>
                <select class="model-select" id="modelSelect">
                    {% for m in models %}
                        <option value="{{ m['id'] }}" {% if m.get('is_default') %}selected{% end %}>{{ m['name'] }}</option>
                    {% end %}
                </select>
            </div>
            <div class="session-list" id="sessionList">
                {% for s in sessions %}
                    <div class="session-item" data-id="{{ s['id'] }}" onclick="selectSession({{ s['id'] }})">
                        <i class="far fa-comments"></i>
                        <span>{{ s['title'] }}</span>
                        <i class="fas fa-times del-btn" onclick="event.stopPropagation();removeSession({{ s['id'] }}, this)"></i>
                    </div>
                {% end %}
            </div>
            <div class="sidebar-footer">
                <a href="/user/logout"><i class="fas fa-sign-out-alt"></i> 退出登录</a>
            </div>
        </div>

        <!-- Main chat area -->
        <div class="main-area">
            <div class="chat-header">
                <button class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                <span class="chat-header-title" id="chatTitle">新对话</span>
                <span class="chat-header-model" id="headerModel">{{ models[0]['name'] if models else '未配置' }}</span>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-icon"><i class="fas fa-robot"></i></div>
                    <h2>有什么可以帮你的？</h2>
                    <p>输入问题开始与 AI 对话，或使用 @ 调用数字员工</p>
                    <div class="suggestions">
                        <div class="suggestion" onclick="quickAsk('你好，请介绍一下你自己')"><i class="fas fa-comment" style="margin-right:6px;"></i>你好，介绍一下</div>
                        {% for e in employees[:3] %}
                        <div class="suggestion" onclick="quickAsk('@{{ e['alias'] }} {% if e['category'] == 'ai' %}你好{% else %}查询{% end %}')"><i class="fas fa-at" style="margin-right:6px;color:{{ e['color'] }};"></i>@{{ e['alias'] }}</div>
                        {% end %}
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <div class="input-container">
                    <div class="emp-dropdown" id="empDropdown"></div>
                    <div class="input-wrapper">
                        <textarea id="chatInput" rows="1" placeholder="输入消息，输入 @ 可调用数字员工..." oninput="onInput(this)" onkeydown="onKey(event)"></textarea>
                        <button class="send-btn" id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
                    </div>
                    <div class="input-hint">Enter 发送 · Shift+Enter 换行 · Markdown 渲染 · @员工调用 · 流式响应</div>
                </div>
            </div>
        </div>
    </div>

    <script>
    const employees = {{ employees_json }};
    const defaultModelId = {{ default_model_id or 0 }};
    let currentSessionId = 0;
    let currentModelId = defaultModelId || 0;
    let isStreaming = false;

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }

    function escapeHtml(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function renderMd(t) { try { return marked.parse(t || ''); } catch(e) { return escapeHtml(t || ''); } }

    function scrollToBottom() {
        const c = document.getElementById('chatMessages');
        c.scrollTop = c.scrollHeight;
    }

    function addMsg(role, content, name, color) {
        const w = document.getElementById('welcomeScreen');
        if (w) w.style.display = 'none';
        const c = document.getElementById('chatMessages');
        const d = document.createElement('div');
        d.className = 'message ' + role;
        const icon = role === 'user' ? 'fas fa-user' : 'fas fa-robot';
        const style = role === 'assistant' ? 'style="background:' + (color || 'rgba(255,255,255,0.08)') + ';color:' + (color ? '#fff' : '#64f4ac') + '"' : '';
        d.innerHTML = '<div class="msg-avatar" ' + style + '><i class="' + icon + '"></i></div><div class="msg-content"><div class="msg-name">' + name + '</div><div class="msg-bubble">' + (role === 'user' ? escapeHtml(content).replace(/\n/g,'<br>') : renderMd(content)) + '</div></div>';
        c.appendChild(d);
        scrollToBottom();
        return d;
    }

    function addTyping(name, color) {
        const w = document.getElementById('welcomeScreen');
        if (w) w.style.display = 'none';
        const c = document.getElementById('chatMessages');
        const d = document.createElement('div');
        d.className = 'message assistant';
        d.innerHTML = '<div class="msg-avatar" style="background:' + (color || 'rgba(255,255,255,0.08)') + ';color:' + (color ? '#fff' : '#64f4ac') + '"><i class="fas fa-robot"></i></div><div class="msg-content"><div class="msg-name">' + name + '</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div></div>';
        c.appendChild(d);
        scrollToBottom();
        return d;
    }

    function getEmpAlias(text) {
        const m = text.match(/^@(\S+)/);
        if (m) {
            for (let i = 0; i < employees.length; i++) {
                if (employees[i].alias === m[1]) return employees[i].alias;
            }
        }
        return '';
    }

    function onInput(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        const val = el.value;
        const pos = el.selectionStart;
        const before = val.substring(0, pos);
        const at = before.match(/@(\S*)$/);
        const dd = document.getElementById('empDropdown');
        if (at) {
            const q = at[1].toLowerCase();
            const list = employees.filter(function(e) { return e.alias.toLowerCase().indexOf(q) > -1; });
            if (list.length) {
                dd.innerHTML = list.map(function(e) {
                    return '<div class="emp-option" onclick="insertEmp(\'' + e.alias + '\')"><span class="emp-dot" style="background:' + e.color + '"></span><div class="emp-info"><div class="emp-name">@' + e.alias + ' · ' + e.name + '</div><div class="emp-desc">' + (e.description || '') + '</div></div></div>';
                }).join('');
                dd.classList.add('show');
            } else { dd.classList.remove('show'); }
        } else { dd.classList.remove('show'); }
    }

    function insertEmp(alias) {
        const inp = document.getElementById('chatInput');
        const val = inp.value;
        const pos = inp.selectionStart;
        const before = val.substring(0, pos);
        const atPos = before.lastIndexOf('@');
        const nv = val.substring(0, atPos) + '@' + alias + ' ' + val.substring(pos);
        inp.value = nv; inp.focus();
        document.getElementById('empDropdown').classList.remove('show');
        onInput(inp);
    }

    function onKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

    function quickAsk(t) { document.getElementById('chatInput').value = t; sendMessage(); }

    async function sendMessage() {
        const inp = document.getElementById('chatInput');
        const content = inp.value.trim();
        if (!content || isStreaming) return;
        inp.value = ''; inp.style.height = 'auto';
        isStreaming = true;
        document.getElementById('sendBtn').disabled = true;

        const empAlias = getEmpAlias(content);
        addMsg('user', content, '你', '');

        let empColor = '';
        let aiName = 'AI';
        if (empAlias) {
            for (let i = 0; i < employees.length; i++) {
                if (employees[i].alias === empAlias) { aiName = employees[i].name; empColor = employees[i].color; break; }
            }
        }
        const typeDiv = addTyping(aiName, empColor);
        const bubble = typeDiv.querySelector('.msg-bubble');
        let full = '';

        try {
            const resp = await fetch('/api/chat/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ session_id: currentSessionId, content: content, model_id: currentModelId, employee_alias: empAlias })
            });
            const reader = resp.body.getReader();
            const dec = new TextDecoder();
            let buf = '';
            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buf += dec.decode(value, { stream: true });
                const lines = buf.split('\n');
                buf = lines.pop() || '';
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('data: ')) {
                        try {
                            const d = JSON.parse(lines[i].substring(6));
                            if (d.content !== undefined) {
                                full += d.content;
                                bubble.innerHTML = renderMd(full);
                                scrollToBottom();
                            }
                            if (d.done) break;
                        } catch(e) {}
                    }
                }
            }
        } catch(e) {
            bubble.innerHTML = '<span style="color:#ff6b81;">请求失败: ' + escapeHtml(e.message) + '</span>';
        }
        isStreaming = false;
        document.getElementById('sendBtn').disabled = false;
    }

    function createSession() {
        const fd = new FormData();
        fd.append('model_id', currentModelId);
        fetch('/api/chat/sessions', { method: 'POST', body: fd })
            .then(function(r){ return r.json(); })
            .then(function(res){
                if (res.code === 0) {
                    currentSessionId = res.data.id;
                    document.getElementById('chatMessages').innerHTML = '<div class="welcome-screen" id="welcomeScreen"><div class="welcome-icon"><i class="fas fa-robot"></i></div><h2>有什么可以帮你的？</h2><p>输入问题开始与 AI 对话</p></div>';
                    document.getElementById('chatTitle').textContent = '新对话';
                    refreshSessions();
                }
            });
    }

    function selectSession(sid) {
        currentSessionId = sid;
        document.querySelectorAll('.session-item').forEach(function(el) {
            el.classList.toggle('active', parseInt(el.dataset.id) === sid);
        });
        fetch('/api/chat/messages?session_id=' + sid)
            .then(function(r){ return r.json(); })
            .then(function(res){
                const c = document.getElementById('chatMessages');
                c.innerHTML = '';
                res.data.forEach(function(msg){
                    let name = msg.role === 'user' ? '你' : 'AI';
                    let color = '';
                    if (msg.employee_alias) {
                        for (let i = 0; i < employees.length; i++) {
                            if (employees[i].alias === msg.employee_alias) { name = employees[i].name; color = employees[i].color; break; }
                        }
                    } else if (msg.model) {
                        name = msg.model;
                    }
                    addMsg(msg.role, msg.content, name, msg.role === 'assistant' ? color : '');
                });
                const s = document.querySelector('.session-item[data-id="'+sid+'"] span');
                if (s) document.getElementById('chatTitle').textContent = s.textContent;
                if (window.innerWidth < 768) toggleSidebar();
            });
    }

    function removeSession(sid, btnEl) {
        fetch('/api/chat/sessions?id=' + sid, { method: 'DELETE' })
            .then(function(r){ return r.json(); })
            .then(function(res){
                btnEl.closest('.session-item').remove();
                if (currentSessionId === sid) {
                    currentSessionId = 0;
                    document.getElementById('chatMessages').innerHTML = '<div class="welcome-screen" id="welcomeScreen"><div class="welcome-icon"><i class="fas fa-robot"></i></div><h2>有什么可以帮你的？</h2><p>输入问题开始与 AI 对话</p></div>';
                    document.getElementById('chatTitle').textContent = '新对话';
                }
            });
    }

    function refreshSessions() {
        fetch('/api/chat/sessions')
            .then(function(r){ return r.json(); })
            .then(function(res){
                const list = document.getElementById('sessionList');
                list.innerHTML = '';
                (res.data || []).forEach(function(s){
                    const d = document.createElement('div');
                    d.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
                    d.dataset.id = s.id;
                    d.onclick = function() { selectSession(s.id); };
                    d.innerHTML = '<i class="far fa-comments"></i><span>' + s.title + '</span><i class="fas fa-times del-btn" onclick="event.stopPropagation();removeSession(' + s.id + ', this)"></i>';
                    list.appendChild(d);
                });
            });
    }

    document.getElementById('modelSelect').addEventListener('change', function() {
        currentModelId = parseInt(this.value);
        const opt = this.options[this.selectedIndex];
        document.getElementById('headerModel').textContent = opt.textContent;
    });

    document.addEventListener('click', function(e) {
        if (!e.target.closest('.emp-dropdown') && !e.target.closest('#chatInput')) {
            document.getElementById('empDropdown').classList.remove('show');
        }
    });
    </script>
</body>
</html>
