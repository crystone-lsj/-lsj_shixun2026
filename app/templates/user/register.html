<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    <link rel="stylesheet" href="/static/dist/bootstrap-5.3.8-dist/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/dist/fontawesome-free-5.15.4-web/fontawesome-free-5.15.4-web/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1a1040 50%, #0d1117 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', sans-serif; color: #e0e6ed;
        }
        .login-card {
            width: 400px; background: rgba(255,255,255,0.04); border: 1px solid rgba(100,140,255,0.1);
            border-radius: 16px; padding: 40px 32px;
        }
        .login-logo { text-align: center; margin-bottom: 24px; font-size: 24px; font-weight: 700;
            background: linear-gradient(135deg, #6366f1, #a855f7, #64f4ac);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .form-control {
            background: rgba(255,255,255,0.06); border: 1px solid rgba(100,140,255,0.15);
            color: #e0e6ed; border-radius: 10px; padding: 12px 16px;
        }
        .form-control:focus { border-color: rgba(99,102,241,0.6); box-shadow: 0 0 20px rgba(99,102,241,0.1); background: rgba(255,255,255,0.08); }
        .form-control::placeholder { color: #555d7e; }
        .btn-login {
            background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; border: none;
            border-radius: 10px; padding: 12px; width: 100%; font-size: 16px; font-weight: 500;
        }
        .btn-login:hover { background: linear-gradient(135deg, #818cf8, #a78bfa); }
        .register-link { text-align: center; margin-top: 16px; }
        .register-link a { color: #64f4ac; text-decoration: none; }
        .error-msg { background: rgba(255,107,129,0.1); border: 1px solid rgba(255,107,129,0.2);
            color: #ff6b81; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo"><i class="fas fa-chart-line"></i> 智能瞭望与问数系统</div>
        <p style="text-align: center; color: #8892b0; margin-bottom: 24px; font-size: 14px;">创建新账号，开启智能对话之旅</p>
        {% if error %}
            <div class="error-msg"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
        {% end %}
        <form method="POST">
            <div class="mb-3">
                <label style="font-size: 13px; color: #8892b0; margin-bottom: 6px; display: block;">用户名</label>
                <input type="text" name="username" class="form-control" placeholder="请输入用户名" required>
            </div>
            <div class="mb-3">
                <label style="font-size: 13px; color: #8892b0; margin-bottom: 6px; display: block;">昵称（可选）</label>
                <input type="text" name="nickname" class="form-control" placeholder="请输入昵称">
            </div>
            <div class="mb-3">
                <label style="font-size: 13px; color: #8892b0; margin-bottom: 6px; display: block;">密码</label>
                <input type="password" name="password" class="form-control" placeholder="至少6位密码" required>
            </div>
            <div class="mb-4">
                <label style="font-size: 13px; color: #8892b0; margin-bottom: 6px; display: block;">确认密码</label>
                <input type="password" name="confirm" class="form-control" placeholder="请再次输入密码" required>
            </div>
            <button type="submit" class="btn-login"><i class="fas fa-user-plus"></i> 注 册</button>
        </form>
        <div class="register-link">
            <span style="color: #8892b0;">已有账号？</span>
            <a href="/user/login">立即登录</a>
        </div>
    </div>
</body>
</html>
